<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="layui/css/layui.css">
    <title>新星帝国</title>
    <style>
        :root {
            --bg-primary: #05080c;
            --bg-panel: rgba(8, 16, 26, 0.95);
            --border-cyan: rgba(0, 212, 255, 0.28);
            --accent-cyan: #00d4ff;
            --accent-green: #00ff9d;
            --accent-orange: #ff9500;
            --text-primary: #e6f7ff;
            --text-muted: #6a8aaa;
            --font-mono: 'Courier New', 'Noto Sans SC', monospace;
            --font-body: 'Segoe UI', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 13px;
            line-height: 1.45;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            height: 44px;
            background: linear-gradient(180deg, rgba(0, 212, 255, 0.12) 0%, rgba(5, 8, 12, 0.6) 100%);
            border-bottom: 1px solid var(--border-cyan);
            box-shadow: 0 2px 14px rgba(0, 212, 255, 0.12);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 100;
        }

        .header-title {
            font-family: var(--font-mono);
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-cyan);
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
            margin: 0;
        }

        .countdown-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            height: 24px;
            padding: 0 8px;
            background: rgba(0, 212, 255, 0.12);
            border: 1px solid var(--border-cyan);
            border-radius: 4px;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-green);
            text-shadow: 0 0 8px rgba(0, 255, 157, 0.5);
            box-shadow: inset 0 0 10px rgba(0, 212, 255, 0.08);
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            position: fixed;
            top: 44px;
            left: 0;
            width: 100%;
            height: 36px;
            background: rgba(5, 8, 12, 0.98);
            border-bottom: 1px solid var(--border-cyan);
            z-index: 99;
        }

        .tab-input {
            display: none;
        }

        .tab-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            position: relative;
            transition: color 0.18s ease, background 0.18s ease;
            letter-spacing: 2px;
        }

        .tab-label:hover {
            color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.06);
        }

        .tab-label::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--accent-cyan);
            box-shadow: 0 0 6px var(--accent-cyan);
            transition: width 0.18s ease, left 0.18s ease;
        }

        #shouye:checked ~ .tab-bar .tab-label[for="shouye"],
        #richang:checked ~ .tab-bar .tab-label[for="richang"] {
            color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.1);
        }

        #shouye:checked ~ .tab-bar .tab-label[for="shouye"]::after,
        #richang:checked ~ .tab-bar .tab-label[for="richang"]::after {
            left: 10%;
            width: 80%;
        }

        /* Tab content switching */
        #shouye:checked ~ .content-wrap .richang_content,
        #richang:checked ~ .content-wrap .shouye_content {
            display: none;
        }

        /* Content area */
        .content-wrap {
            margin: 0;
            padding: 92px 12px 68px 12px;
            list-style: none;
            width: 100%;
        }

        .tab-panel {
            display: block;
        }

        /* Panels */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-cyan);
            border-radius: 6px;
            margin-bottom: 10px;
            box-shadow: inset 0 0 24px rgba(0, 212, 255, 0.05), 0 4px 16px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: linear-gradient(90deg, rgba(0, 212, 255, 0.12) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-cyan);
        }

        .panel-header::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 12px;
            background: var(--accent-cyan);
            margin-right: 8px;
            box-shadow: 0 0 6px var(--accent-cyan);
        }

        .panel-title {
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            margin: 0;
        }

        .panel-body {
            padding: 12px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-green);
            margin: 0 0 8px 0;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title::before {
            content: '▸';
            color: var(--accent-cyan);
            font-size: 12px;
        }

        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-cyan), transparent);
            margin: 12px 0;
            border: none;
        }

        /* Checkbox system */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        .checkbox-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .checkbox-item {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            margin: 0 6px 0 0;
            border: 1px solid var(--border-cyan);
            border-radius: 3px;
            background: rgba(0, 212, 255, 0.08);
            cursor: pointer;
            position: relative;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
            flex-shrink: 0;
        }

        .checkbox-item input[type="checkbox"]:checked {
            background: rgba(0, 212, 255, 0.25);
            border-color: var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.35);
        }

        .checkbox-item input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 4px;
            height: 8px;
            border: solid var(--accent-cyan);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-item input[type="checkbox"]:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }

        .checkbox-item label {
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            transition: color 0.18s ease;
        }

        .checkbox-item:hover label {
            color: var(--accent-cyan);
        }

        .checkbox-item:hover input[type="checkbox"] {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 6px rgba(0, 212, 255, 0.25);
        }

        .hint-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.35;
        }

        .inline-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: 6px;
        }

        /* Flex containers for inline labels and checkboxes */
        .control-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-label {
            font-size: 13px;
            color: var(--text-primary);
            font-weight: 500;
            white-space: nowrap;
        }

        /* Other tab placeholder */
        .standby-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            text-align: center;
            min-height: 180px;
        }

        .standby-icon {
            width: 56px;
            height: 56px;
            border: 2px solid var(--border-cyan);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.12), inset 0 0 12px rgba(0, 212, 255, 0.06);
        }

        .standby-icon::before {
            content: '◈';
            font-size: 24px;
            color: var(--accent-cyan);
        }

        .standby-title {
            font-family: var(--font-mono);
            font-size: 15px;
            color: var(--accent-cyan);
            letter-spacing: 2px;
            margin: 0 0 8px 0;
        }

        .standby-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
        }

        /* Bottom actions */
        .action-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 52px;
            position: fixed;
            bottom: 0;
            left: 0;
            padding: 0 12px;
            background: linear-gradient(0deg, rgba(5, 8, 12, 1) 0%, rgba(5, 8, 12, 0.85) 60%, transparent 100%);
            z-index: 100;
        }

        .btn {
            flex: 1;
            height: 36px;
            font-family: var(--font-mono);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-cyan);
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.08);
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.08);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.16);
        }

        .btn-secondary:active {
            background: rgba(0, 212, 255, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.9) 0%, rgba(0, 180, 220, 0.95) 100%);
            color: #001018;
            border: 1px solid var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.24);
        }

        .btn-primary:hover {
            box-shadow: 0 0 14px rgba(0, 212, 255, 0.32);
            filter: brightness(1.04);
        }

        .btn-primary:active {
            filter: brightness(0.95);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 72px;
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: rgba(10, 24, 36, 0.98);
            color: var(--accent-green);
            padding: 10px 20px;
            border-radius: 6px;
            border: 1px solid var(--border-cyan);
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 16px rgba(0, 212, 255, 0.15);
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

<script type="text/javascript">
    // 定义一个函数用于保存开关的状态到 localStorage
    function saveSwitchStatus(id) {
        var isChecked = document.getElementById(id).checked;
        localStorage.setItem(id, isChecked);
        return isChecked;
    }

    function deleteAllItems(configNum) {
        localStorage.clear();
        console.log('当前配置 已清空');
        setAllItems();
    }

    function saveConfigItems(configNum) {
        saveAllItems();
        const allItems = {};

        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (!key.includes('config') && !key.includes('账号') && !key.includes('角色') && !key.includes('激活码') && !key.includes('配置')) {
                const value = localStorage.getItem(key);
                allItems[key] = value;
            }
        }
        const jsonString = JSON.stringify(allItems, null, 2);
        localStorage.setItem('config' + configNum, jsonString);

        showToast('保存成功');
    }

    function showToast(message) {
        var toast = document.getElementById('toast');
        toast.innerHTML = message;
        toast.classList.add('show');

        setTimeout(function() {
            toast.classList.remove('show');
        }, 2000);
    }

    function toggleInviteToast() {
        var inviteIds = ['秘境自动接收邀请', '恶龙自动接收邀请', '梦魇自动接收邀请', '绝境自动接收邀请', '暴走自动接收邀请', '终末战自动接收邀请', '三魔头自动接收邀请'];
        var hasInviteEnabled = inviteIds.some(function(id) {
            var element = document.getElementById(id);
            return element ? element.checked : false;
        });

        if (hasInviteEnabled) {
            showToast('开启自动接收组队邀请，自动任务将暂停执行');
        }
    }

    function toggleAIStartToast() {
        var aiStartIds = ['AI进入战斗后启动', '暴走进入战斗后启动', '技能进入战斗后启动'];
        var hasAIStartEnabled = aiStartIds.some(function(id) {
            var element = document.getElementById(id);
            return element ? element.checked : false;
        });

        if (hasAIStartEnabled) {
            showToast('开启进入战斗后启动，自动任务将暂停执行');
        }
    }

    function readAllItems(configNum) {
        const jsonString = localStorage.getItem('config' + configNum);
        if (jsonString) {
            try {
                const configData = JSON.parse(jsonString);
                for (const key in configData) {
                    if (configData.hasOwnProperty(key)) {
                        if (!key.includes('config') && !key.includes('账号') && !key.includes('角色') && !key.includes('激活码') && !key.includes('配置')) {
                            localStorage.setItem(key, configData[key]);

                    }
                }
                setAllItems();
                showToast('加载成功');
            } catch (error) {
                console.error('解析 JSON 失败:', error);
            }
        } else {
            console.log('没有找到配置');
        }
    }

    let isAutoClicked = false;
    let autoClickIntervalId = null;

    function autoClickButton() {
        const button = document.getElementById('queding');
        const countdownElement = document.getElementById('countdown');

        if (button && countdownElement) {
            if (autoClickIntervalId) {
                clearInterval(autoClickIntervalId);
            }

            let remainingTime = 30;
            countdownElement.textContent = `${remainingTime}`;

            autoClickIntervalId = setInterval(() => {
                remainingTime--;
                countdownElement.textContent = `${remainingTime}`;

                if (remainingTime <= 0) {
                    clearInterval(autoClickIntervalId);
                    autoClickIntervalId = null;
                    if (!isAutoClicked) {
                        button.click();
                        console.log("按钮已点击");
                        isAutoClicked = true;
                    }
                }
            }, 1000);
        } else {
            console.error("未找到按钮或倒计时元素");
        }
    }

    function setAllItems() {
        setSwitchStatus("攻击舰队");
        setSwitchStatus("清道夫舰队");
        setSwitchStatus("清道夫战斗群");
        setSwitchStatus("全部舰队");
        setSwitchStatus("智能分配");
        setSwitchStatus("单独派遣");
        setSwitchStatus("仅寻找当前位置");
        setSwitchStatus("采集残骸");
        setSwitchStatus("舰队残骸");
        setSwitchStatus("水晶残骸");
        setSwitchStatus("合金残骸");
        setSwitchStatus("快速维修");
    }

    window.onload = function () {
        console.log("窗口加载成功了");
        autoClickButton();
        airscript.call("加载", "成功");
        setAllItems();
    };

    layui.use(['form'], function(){
      var form = layui.form;

      form.on('select(mijing1-filter)', function(data){
        var mjId = data.value;
        console.log(mjId);
        var $mjgqSelect = $('#秘境关卡');

        if (!$mjgqSelect.length) {
          return;
        }

        if(mjId === '原野') {
          $mjgqSelect.html('<option value="古遗迹上的幽影">古遗迹上的幽影</option>');
        }

        form.render('select');
      });
    });

    function setSwitchStatus(id) {
        var itemValue = localStorage.getItem(id);
        document.getElementById(id).checked = itemValue === "true";
    }

    function xgip(xip) {
        var target = document.getElementById("bjip");
        if (target) {
            target.innerHTML = xip;
        }
    }

    function saveAllItems() {
        var 攻击舰队 = saveSwitchStatus("攻击舰队");
        var 清道夫舰队 = saveSwitchStatus("清道夫舰队");
        var 清道夫战斗群 = saveSwitchStatus("清道夫战斗群");
        var 全部舰队 = saveSwitchStatus("全部舰队");
        var 智能分配 = saveSwitchStatus("智能分配");
        var 单独派遣 = saveSwitchStatus("单独派遣");
        var 仅寻找当前位置 = saveSwitchStatus("仅寻找当前位置");
        var 采集残骸 = saveSwitchStatus("采集残骸");
        var 舰队残骸 = saveSwitchStatus("舰队残骸");
        var 水晶残骸 = saveSwitchStatus("水晶残骸");
        var 合金残骸 = saveSwitchStatus("合金残骸");
        var 快速维修 = saveSwitchStatus("快速维修");

        var data = {
            攻击舰队: 攻击舰队,
            清道夫舰队: 清道夫舰队,
            清道夫战斗群: 清道夫战斗群,
            全部舰队: 全部舰队,
            智能分配: 智能分配,
            单独派遣: 单独派遣,
            仅寻找当前位置: 仅寻找当前位置,
            采集残骸: 采集残骸,
            舰队残骸: 舰队残骸,
            水晶残骸: 水晶残骸,
            合金残骸: 合金残骸,
            快速维修: 快速维修,
        };

        return data;
    }

    function submit() {
        isAutoClicked = true;
        if (autoClickIntervalId) {
            clearInterval(autoClickIntervalId);
            autoClickIntervalId = null;
        }
        var data = saveAllItems();
        airscript.call("submit", JSON.stringify(data));
        airscript.close();
    }

    function wclose() {
        isAutoClicked = true;
        if (autoClickIntervalId) {
            clearInterval(autoClickIntervalId);
            autoClickIntervalId = null;
        }
        var guan = document.getElementById("guanbi").value;
        airscript.call("guan", guan);
        console.log("退出程序" + guan);
        airscript.close();
    }
</script>
